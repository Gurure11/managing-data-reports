<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Revenue & Performance Dashboard | Google Sheets Integration</title>
  <!-- Tailwind + Lucide Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { transition: all 0.1s ease; }
    body { background: #f1f5f9; font-family: system-ui, -apple-system, 'Inter', sans-serif; }
    .rounded-3xl { border-radius: 1.5rem; }
    .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0f172a; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="antialiased">
<div id="app-root" class="min-h-screen bg-slate-100 text-slate-900">
  <div class="flex items-center justify-center min-h-screen">
    <div class="text-center">
      <div class="loading-spinner"></div>
      <p class="mt-4 text-slate-600">Loading data from Google Sheets...</p>
    </div>
  </div>
</div>

<script>
  // Google Sheets configuration
  const SPREADSHEET_CONFIG = {
    // Revenue Sheet ID (Actuals & Projected Budget)
    revenueSheetId: '1wl599p4871pR2tOZmIuq44pdDy6N2PggKrmMrfD8wv0',
    revenueSheetName: 'Revenue',
    // Budgets Sheet ID (for Confirmed/Forecast totals)
    budgetsSheetId: '1X8JvZqdGOPAFhL-H-PemqWHVs5Gk3P3tmrrdeP0SMEA',
    budgetsSheetName: 'Budgets'
  };

  // API endpoint (will be deployed from Apps Script)
  // For development/testing with Apps Script, you'll replace this with your deployed URL
  // Example: 'https://script.google.com/macros/s/AKfycbzxaI_g8Vz_7tCKuEepHpcv36NPwkSfgHFjRcjwe7SeakYA1uQYJwEYe7KIALdNyOCXaA/exec'
  let API_BASE_URL = '';
  
  // Store data from Google Sheets
  let sheetData = {
    revenueRows: [],      // Array of daily revenue entries
    confirmedTotal: 0,    // Total Amount from Budgets sheet with status "Confirmed"
    forecastTotal: 0,     // Total Amount from Budgets sheet with status "Forecast"
    groupMTD: 0,          // Month-to-Date total from revenue sheet (current month)
    groupBYTE: 0,         // Year-to-Date or custom aggregate
    isLoading: true,
    error: null
  };

  // Helper functions
  function money(val) { 
    return new Intl.NumberFormat("en-ZA", { style:"currency", currency:"ZAR", maximumFractionDigits:0 }).format(val || 0); 
  }
  
  function pct(actual, target) { 
    if (!target || target === 0) return 0; 
    return Math.round((actual / target) * 100); 
  }
  
  function statusTone(score) { 
    if (score >= 80) return "bg-green-100 text-green-700 border-green-200"; 
    if (score >= 50) return "bg-amber-100 text-amber-700 border-amber-200"; 
    return "bg-red-100 text-red-700 border-red-200"; 
  }
  
  function actionTone(status) { 
    if (status === "Closed") return "bg-green-100 text-green-700 border-green-200"; 
    if (status === "In Progress") return "bg-amber-100 text-amber-700 border-amber-200"; 
    if (status === "Escalated") return "bg-red-100 text-red-700 border-red-200"; 
    return "bg-slate-100 text-slate-700 border-slate-200"; 
  }

  // Calculate daily budget from monthly projected budget
  // Assuming 22 working days per month average, or you can use actual days in month
  function calculateDailyBudget(monthlyBudget) {
    const workingDaysPerMonth = 22; // Standard working days
    return monthlyBudget / workingDaysPerMonth;
  }

  // Aggregate revenue data by project/PM/division from daily entries
  function aggregateProjectsFromRevenue(rows) {
    const projectMap = new Map();
    
    rows.forEach(row => {
      const key = `${row.projectName}|${row.manager}|${row.costCenter}`;
      if (!projectMap.has(key)) {
        projectMap.set(key, {
          id: `P${projectMap.size + 1}`,
          division: row.costCenter || 'General',
          pm: row.manager || 'Unassigned',
          client: row.projectName?.split(' - ')[0] || row.projectName || 'Client',
          project: row.projectName || 'Unknown Project',
          status: "Confirmed",
          revenueDaily: 0,
          revenueWeekly: 0,
          revenueMonthly: 0,
          revenueQuarterly: 0,
          revenueYearly: 0,
          targetDaily: 0,
          targetWeekly: 0,
          targetMonthly: 0,
          targetQuarterly: 0,
          targetYearly: 0,
          gpPercent: row.margin || 15,
          deadlineScore: 75,
          safetyScore: row.safety || 95,
          qualityScore: 80,
          cashCollected: 0,
          forecastYear: 0,
          lastUpdate: new Date().toISOString(),
          recovery: "On track",
          actionOwner: row.manager || 'PM',
          actionDue: new Date(Date.now() + 7*24*60*60*1000).toISOString().split('T')[0],
          actionStatus: "Open"
        });
      }
      
      const project = projectMap.get(key);
      const dailyActual = row.actuals || 0;
      const dailyBudget = row.budgetDaily || 0;
      
      project.revenueDaily += dailyActual;
      project.targetDaily += dailyBudget;
      
      // Aggregate to weekly/monthly/quarterly/yearly based on date
      const date = new Date(row.date);
      const weekNum = getWeekNumber(date);
      const month = date.getMonth();
      const quarter = Math.floor(date.getMonth() / 3);
      const year = date.getFullYear();
      
      // Store in maps for further aggregation if needed
      if (!project._weeklyMap) project._weeklyMap = new Map();
      if (!project._monthlyMap) project._monthlyMap = new Map();
      if (!project._quarterlyMap) project._quarterlyMap = new Map();
      if (!project._yearlyMap) project._yearlyMap = new Map();
      
      const weekKey = `${year}-W${weekNum}`;
      const monthKey = `${year}-${month}`;
      const quarterKey = `${year}-Q${quarter}`;
      const yearKey = `${year}`;
      
      project._weeklyMap.set(weekKey, (project._weeklyMap.get(weekKey) || 0) + dailyActual);
      project._monthlyMap.set(monthKey, (project._monthlyMap.get(monthKey) || 0) + dailyActual);
      project._quarterlyMap.set(quarterKey, (project._quarterlyMap.get(quarterKey) || 0) + dailyActual);
      project._yearlyMap.set(yearKey, (project._yearlyMap.get(yearKey) || 0) + dailyActual);
    });
    
    // Calculate weekly/monthly/quarterly/yearly totals
    const projects = Array.from(projectMap.values());
    projects.forEach(project => {
      project.revenueWeekly = Math.round(Array.from(project._weeklyMap.values()).reduce((a,b) => a+b, 0) / Math.max(project._weeklyMap.size, 1));
      project.revenueMonthly = Math.round(Array.from(project._monthlyMap.values()).reduce((a,b) => a+b, 0) / Math.max(project._monthlyMap.size, 1));
      project.revenueQuarterly = Math.round(Array.from(project._quarterlyMap.values()).reduce((a,b) => a+b, 0) / Math.max(project._quarterlyMap.size, 1));
      project.revenueYearly = Math.round(Array.from(project._yearlyMap.values()).reduce((a,b) => a+b, 0));
      
      project.targetWeekly = project.targetDaily * 5;
      project.targetMonthly = project.targetDaily * 22;
      project.targetQuarterly = project.targetMonthly * 3;
      project.targetYearly = project.targetMonthly * 12;
      
      project.cashCollected = project.revenueDaily * 0.7;
      project.forecastYear = project.revenueYearly;
      
      delete project._weeklyMap;
      delete project._monthlyMap;
      delete project._quarterlyMap;
      delete project._yearlyMap;
    });
    
    return projects;
  }
  
  function getWeekNumber(date) {
    const d = new Date(date);
    d.setHours(0,0,0,0);
    d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
    const week1 = new Date(d.getFullYear(), 0, 4);
    return 1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
  }

  // Calculate MTD (Month-to-Date)
  function calculateMTD(rows) {
    const now = new Date();
    const currentMonth = now.getMonth();
    const currentYear = now.getFullYear();
    
    const mtdTotal = rows
      .filter(row => {
        const date = new Date(row.date);
        return date.getMonth() === currentMonth && date.getFullYear() === currentYear;
      })
      .reduce((sum, row) => sum + (row.actuals || 0), 0);
    
    return mtdTotal;
  }
  
  // Calculate BYTE (Year-to-Date or custom)
  function calculateBYTE(rows) {
    const now = new Date();
    const currentYear = now.getFullYear();
    
    const ytdTotal = rows
      .filter(row => {
        const date = new Date(row.date);
        return date.getFullYear() === currentYear;
      })
      .reduce((sum, row) => sum + (row.actuals || 0), 0);
    
    return ytdTotal;
  }

  // Load data from Google Sheets via Apps Script
  async function loadDataFromSheets() {
    // First, try to use the Google Sheets API with a deployed Apps Script
    // For local testing without CORS, we'll use a mock/sample data
    // In production with Apps Script, uncomment the fetch calls
    
    try {
      // Attempt to fetch from Apps Script deployment
      // You'll need to deploy your Apps Script and set API_BASE_URL
      if (API_BASE_URL) {
        const revenueResponse = await fetch(`${API_BASE_URL}?action=getRevenueData`);
        const budgetsResponse = await fetch(`${API_BASE_URL}?action=getBudgetsData`);
        
        if (revenueResponse.ok && budgetsResponse.ok) {
          const revenueData = await revenueResponse.json();
          const budgetsData = await budgetsResponse.json();
          
          sheetData.revenueRows = revenueData.rows || [];
          sheetData.confirmedTotal = budgetsData.confirmedTotal || 0;
          sheetData.forecastTotal = budgetsData.forecastTotal || 0;
          sheetData.groupMTD = calculateMTD(sheetData.revenueRows);
          sheetData.groupBYTE = calculateBYTE(sheetData.revenueRows);
          sheetData.isLoading = false;
          return;
        }
      }
      
      // Fallback to sample/demo data if Apps Script not deployed
      // This allows the dashboard to work as a demo
      console.log("Using demo data (connect Apps Script for live data)");
      loadDemoData();
      
    } catch (error) {
      console.error("Error loading from Sheets:", error);
      sheetData.error = error.message;
      loadDemoData();
    }
  }
  
  function loadDemoData() {
    // Generate sample revenue data based on the original projects
    const today = new Date();
    const sampleRows = [];
    const projects = [
      { name: "Generators Phase 1", manager: "Moses", costCenter: "OPOT", actuals: 180000, budgetDaily: 15909, margin: 24, safety: 100 },
      { name: "Rooiwal Support Works", manager: "Andrew", costCenter: "OPOT", actuals: 70000, budgetDaily: 5455, margin: 18, safety: 100 },
      { name: "Fibre BOT Conversion", manager: "Govern", costCenter: "Aqua Telecoms", actuals: 110000, budgetDaily: 10909, margin: 22, safety: 100 },
      { name: "RAN Rollout Gauteng", manager: "Phillip", costCenter: "Aqua Telecoms", actuals: 20000, budgetDaily: 3636, margin: 12, safety: 100 },
      { name: "As-and-When Civil Repairs", manager: "Timothy", costCenter: "Nkanyezi", actuals: 25000, budgetDaily: 2273, margin: 19, safety: 100 },
      { name: "Bulk Earthworks Package", manager: "Stanley", costCenter: "Distinct", actuals: 12000, budgetDaily: 2045, margin: 8, safety: 100 },
      { name: "UPS and Battery Upgrade", manager: "Brian", costCenter: "Aqua Tech", actuals: 5000, budgetDaily: 1818, margin: 6, safety: 100 }
    ];
    
    for (let i = 0; i < 30; i++) {
      const date = new Date(today);
      date.setDate(today.getDate() - i);
      projects.forEach(proj => {
        sampleRows.push({
          date: date.toISOString().split('T')[0],
          manager: proj.manager,
          costCenter: proj.costCenter,
          projectName: proj.name,
          actuals: proj.actuals * (0.8 + Math.random() * 0.4),
          projectedBudget: proj.budgetDaily * 22,
          budgetDaily: proj.budgetDaily,
          safety: proj.safety,
          margin: proj.margin,
          createdAt: date.toISOString()
        });
      });
    }
    
    sheetData.revenueRows = sampleRows;
    sheetData.confirmedTotal = 245000000;
    sheetData.forecastTotal = 89000000;
    sheetData.groupMTD = calculateMTD(sampleRows);
    sheetData.groupBYTE = calculateBYTE(sampleRows);
    sheetData.isLoading = false;
  }

  // Main render function (adapted from original)
  let state = {
    period: "Daily",
    division: "All",
    query: "",
    activeKpi: "all",
    viewTab: "executive"
  };
  
  let rootEl = document.getElementById("app-root");
  
  function getFilteredProjects() {
    const projects = aggregateProjectsFromRevenue(sheetData.revenueRows);
    return projects.filter(p => {
      if(state.division !== "All" && p.division !== state.division) return false;
      const q = state.query.toLowerCase();
      const matchesQuery = `${p.project} ${p.client} ${p.pm} ${p.division}`.toLowerCase().includes(q);
      if(!matchesQuery) return false;
      
      const rev = periodRevenue(p, state.period);
      const targ = periodTarget(p, state.period);
      
      if(state.activeKpi === "all") return true;
      if(state.activeKpi === "revenue") return rev < targ;
      if(state.activeKpi === "profitability") return p.gpPercent < 15;
      if(state.activeKpi === "deadlines") return p.deadlineScore < 80;
      if(state.activeKpi === "safety") return p.safetyScore < 100;
      if(state.activeKpi === "quality") return p.qualityScore < 80;
      if(state.activeKpi === "cash") return p.cashCollected < rev;
      if(state.activeKpi === "actions") return p.actionStatus !== "Closed";
      return true;
    });
  }
  
  function periodRevenue(p, period) {
    if(period === "Daily") return p.revenueDaily;
    if(period === "Weekly") return p.revenueWeekly;
    if(period === "Monthly") return p.revenueMonthly;
    if(period === "Quarterly") return p.revenueQuarterly;
    return p.revenueYearly;
  }
  
  function periodTarget(p, period) {
    if(period === "Daily") return p.targetDaily;
    if(period === "Weekly") return p.targetWeekly;
    if(period === "Monthly") return p.targetMonthly;
    if(period === "Quarterly") return p.targetQuarterly;
    return p.targetYearly;
  }
  
  function periodToBucket(period) {
    return { Daily:"daily", Weekly:"weekly", Monthly:"monthly", Quarterly:"quarterly", Yearly:"yearly" }[period];
  }
  
  function render() {
    if (sheetData.isLoading) {
      rootEl.innerHTML = `<div class="flex items-center justify-center min-h-screen"><div class="text-center"><div class="loading-spinner"></div><p class="mt-4 text-slate-600">Loading data from Google Sheets...</p></div></div>`;
      lucide.createIcons();
      return;
    }
    
    const filtered = getFilteredProjects();
    const activeBucket = periodToBucket(state.period);
    const totals = calculateTotals(filtered, state.period);
    const revenueAchievement = pct(totals.revenue, totals.target);
    const profitability = totals.revenue ? Math.round((totals.margin / totals.revenue) * 100) : 0;
    const deadlineScore = Math.round(totals.deadline / Math.max(filtered.length,1));
    const safetyScore = Math.round(totals.safety / Math.max(filtered.length,1));
    const qualityScore = Math.round(totals.quality / Math.max(filtered.length,1));
    const cashConversion = pct(totals.cash, Math.max(totals.revenue,1));
    
    const html = `
      <div class="max-w-7xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <div class="mb-4 flex items-center justify-between rounded-full border bg-white/80 px-4 py-2 shadow-sm backdrop-blur-sm">
          <div class="flex items-center gap-2 text-xs font-semibold uppercase tracking-wide text-slate-500">
            <i data-lucide="layers3" class="w-4 h-4"></i> Revenue Reporting Tool | Live from Google Sheets
          </div>
          <button class="rounded-full bg-slate-900 text-white px-4 py-1 text-sm flex items-center gap-1 hover:bg-slate-700" id="refreshBtn">
            <i data-lucide="refresh-cw" class="w-4 h-4"></i> Refresh Data
          </button>
        </div>
        
        <!-- Summary Cards: MTD, BYTE, Confirmed, Forecast -->
        <div class="grid gap-4 md:grid-cols-4 mb-6">
          <div class="rounded-3xl border bg-gradient-to-br from-slate-900 to-slate-800 text-white p-5 shadow-lg">
            <div class="text-sm opacity-80">Group MTD</div>
            <div class="text-2xl font-bold mt-2">${money(sheetData.groupMTD)}</div>
            <div class="text-xs opacity-70">Month-to-Date Revenue</div>
          </div>
          <div class="rounded-3xl border bg-gradient-to-br from-slate-700 to-slate-600 text-white p-5 shadow-lg">
            <div class="text-sm opacity-80">Group BYTE</div>
            <div class="text-2xl font-bold mt-2">${money(sheetData.groupBYTE)}</div>
            <div class="text-xs opacity-70">Year-to-Date Revenue</div>
          </div>
          <div class="rounded-3xl border bg-gradient-to-br from-emerald-800 to-emerald-700 text-white p-5 shadow-lg">
            <div class="text-sm opacity-80">Total Confirmed</div>
            <div class="text-2xl font-bold mt-2">${money(sheetData.confirmedTotal)}</div>
            <div class="text-xs opacity-70">From Budgets Sheet (Confirmed)</div>
          </div>
          <div class="rounded-3xl border bg-gradient-to-br from-amber-800 to-amber-700 text-white p-5 shadow-lg">
            <div class="text-sm opacity-80">Total Forecast</div>
            <div class="text-2xl font-bold mt-2">${money(sheetData.forecastTotal)}</div>
            <div class="text-xs opacity-70">From Budgets Sheet (Forecast)</div>
          </div>
        </div>
        
        <!-- Filters -->
        <div class="rounded-[32px] border bg-white/90 p-6 shadow-sm mb-6">
          <div class="flex flex-col xl:flex-row xl:items-center xl:justify-between gap-5">
            <div>
              <h1 class="text-2xl font-semibold">Revenue, Performance & Action Reporting</h1>
              <p class="text-sm text-slate-500 mt-1">Live data from Google Sheets • Daily Actuals from Revenue sheet • Budgets from Budgets sheet</p>
            </div>
            <div class="grid gap-3 sm:grid-cols-2 xl:grid-cols-4">
              <select id="periodSelect" class="rounded-2xl bg-slate-50 border p-2 text-sm">
                ${["Daily","Weekly","Monthly","Quarterly","Yearly"].map(p=>`<option ${state.period===p?"selected":""}>${p}</option>`).join("")}
              </select>
              <select id="divisionSelect" class="rounded-2xl bg-slate-50 border p-2 text-sm">
                <option value="All">All divisions</option>
                ${[...new Set(filtered.map(p=>p.division))].map(d=>`<option ${state.division===d?"selected":""}>${d}</option>`).join("")}
              </select>
              <div class="xl:col-span-2 relative">
                <input type="text" id="searchInput" placeholder="Search project, PM, client..." value="${state.query.replace(/"/g, '&quot;')}" class="w-full rounded-2xl bg-slate-50 pl-9 p-2 border">
              </div>
            </div>
          </div>
        </div>
        
        <!-- KPI Cards -->
        <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-5 mb-4">
          ${[
            {title:"Revenue", value:money(totals.revenue), sub:`${state.period} revenue`, icon:"circle-dollar-sign", tone:revenueAchievement>=80?"green":revenueAchievement>=50?"amber":"red", filterKey:"revenue"},
            {title:"Profitability", value:`${profitability}%`, sub:`${state.period} margin`, icon:"trending-up", tone:profitability>=18?"green":profitability>=12?"amber":"red", filterKey:"profitability"},
            {title:"Deadlines", value:`${deadlineScore}%`, sub:`on-time performance`, icon:"clock", tone:deadlineScore>=80?"green":deadlineScore>=50?"amber":"red", filterKey:"deadlines"},
            {title:"Safety", value:`${safetyScore}%`, sub:`safety score`, icon:"shield-alert", tone:safetyScore===100?"green":"amber", filterKey:"safety"},
            {title:"Quality", value:`${qualityScore}%`, sub:`quality score`, icon:"gauge", tone:qualityScore>=80?"green":qualityScore>=50?"amber":"red", filterKey:"quality"}
          ].map(k=>`<div class="cursor-pointer rounded-3xl border p-5 bg-white shadow-sm ${state.activeKpi===k.filterKey?"ring-2 ring-slate-900":""}" data-filter="${k.filterKey}"><div class="flex justify-between"><div><div class="text-sm text-slate-500">${k.title}</div><div class="text-2xl font-semibold">${k.value}</div><div class="text-xs">${k.sub}</div></div><div class="rounded-2xl p-3 bg-${k.tone}-50"><i data-lucide="${k.icon}" class="w-5 h-5 text-${k.tone}-700"></i></div></div></div>`).join("")}
        </div>
        
        <!-- Cash KPIs -->
        <div class="grid gap-4 md:grid-cols-3 mb-6">
          ${[
            {title:"Cash Collected", value:money(totals.cash), sub:"collections", icon:"circle-dollar-sign", tone:cashConversion>=80?"green":cashConversion>=50?"amber":"red", filterKey:"cash"},
            {title:"Cash Conversion", value:`${cashConversion}%`, sub:"revenue to cash", icon:"gauge", tone:cashConversion>=80?"green":cashConversion>=50?"amber":"red", filterKey:"cash"},
            {title:"Open Actions", value:`${filtered.filter(p=>p.actionStatus!=="Closed").length}`, sub:"live actions", icon:"bell", tone:filtered.some(p=>p.actionStatus==="Escalated")?"red":"amber", filterKey:"actions"}
          ].map(k=>`<div class="cursor-pointer rounded-3xl border p-5 bg-white" data-filter="${k.filterKey}"><div class="flex justify-between"><div><div class="text-sm text-slate-500">${k.title}</div><div class="text-2xl font-semibold">${k.value}</div><div class="text-xs">${k.sub}</div></div><div class="rounded-2xl p-3 bg-${k.tone}-50"><i data-lucide="${k.icon}" class="w-5 h-5"></i></div></div></div>`).join("")}
        </div>
        
        <!-- Tabs Navigation -->
        <div class="mt-4">
          <div class="flex rounded-2xl bg-slate-200/70 p-1 gap-1">
            <button class="tab-btn flex-1 py-2 rounded-xl text-sm font-medium ${state.viewTab==="executive"?"bg-white shadow":"text-slate-600"}" data-tab="executive">Executive Summary</button>
            <button class="tab-btn flex-1 py-2 rounded-xl text-sm ${state.viewTab==="performance"?"bg-white shadow":"text-slate-600"}" data-tab="performance">Performance Report</button>
            <button class="tab-btn flex-1 py-2 rounded-xl text-sm ${state.viewTab==="actions"?"bg-white shadow":"text-slate-600"}" data-tab="actions">Action Report</button>
          </div>
          
          <div class="mt-6">
            ${state.viewTab === "executive" ? renderExecutiveView(filtered, totals, state.period) : 
              state.viewTab === "performance" ? renderPerformanceView(filtered, state.period) :
              renderActionsView(filtered)}
          </div>
        </div>
      </div>
    `;
    
    rootEl.innerHTML = html;
    lucide.createIcons();
    attachEventListeners();
  }
  
  function calculateTotals(projects, period) {
    let revenue = 0, target = 0, cash = 0, margin = 0, deadline = 0, safety = 0, quality = 0;
    projects.forEach(p => {
      revenue += periodRevenue(p, period);
      target += periodTarget(p, period);
      cash += p.cashCollected;
      margin += periodRevenue(p, period) * (p.gpPercent / 100);
      deadline += p.deadlineScore;
      safety += p.safetyScore;
      quality += p.qualityScore;
    });
    return { revenue, target, cash, margin, deadline, safety, quality };
  }
  
  function renderExecutiveView(projects, totals, period) {
    const divisionMap = new Map();
    projects.forEach(p => {
      divisionMap.set(p.division, (divisionMap.get(p.division) || 0) + periodRevenue(p, period));
    });
    const divisionData = Array.from(divisionMap.entries()).map(([name, value]) => ({ name, value })).sort((a,b)=>b.value - a.value);
    
    return `
      <div class="space-y-6">
        <div class="rounded-3xl border bg-white p-6">
          <h3 class="font-semibold text-lg mb-4">📊 Top Divisions by ${period} Revenue</h3>
          <div class="space-y-3">
            ${divisionData.slice(0,5).map(d => `<div class="flex justify-between items-center p-3 bg-slate-50 rounded-2xl"><span class="font-medium">${d.name}</span><span class="font-bold">${money(d.value)}</span></div>`).join("")}
          </div>
        </div>
        <div class="rounded-3xl border bg-white p-6">
          <h3 class="font-semibold text-lg mb-4">📈 Performance Overview</h3>
          <div class="grid grid-cols-2 gap-4">
            <div class="p-4 bg-slate-50 rounded-2xl"><div class="text-sm text-slate-500">Total Revenue</div><div class="text-2xl font-bold">${money(totals.revenue)}</div></div>
            <div class="p-4 bg-slate-50 rounded-2xl"><div class="text-sm text-slate-500">Total Target</div><div class="text-2xl font-bold">${money(totals.target)}</div></div>
            <div class="p-4 bg-slate-50 rounded-2xl"><div class="text-sm text-slate-500">Achievement</div><div class="text-2xl font-bold">${pct(totals.revenue, totals.target)}%</div></div>
            <div class="p-4 bg-slate-50 rounded-2xl"><div class="text-sm text-slate-500">Active Projects</div><div class="text-2xl font-bold">${projects.length}</div></div>
          </div>
        </div>
      </div>
    `;
  }
  
  function renderPerformanceView(projects, period) {
    return `
      <div class="rounded-3xl border bg-white overflow-x-auto p-6">
        <h3 class="font-semibold text-lg mb-4">📋 Project Performance (${period})</h3>
        <table class="w-full text-sm">
          <thead class="bg-slate-100">
            <tr><th class="p-3 text-left">Project</th><th class="p-3 text-left">PM</th><th class="p-3 text-right">Revenue</th><th class="p-3 text-right">Target</th><th class="p-3 text-right">Achievement</th><th class="p-3 text-right">Margin</th></tr>
          </thead>
          <tbody>
            ${projects.map(p => `<tr class="border-b"><td class="p-3">${p.project}</td><td class="p-3">${p.pm}</td><td class="p-3 text-right">${money(periodRevenue(p, period))}</td><td class="p-3 text-right">${money(periodTarget(p, period))}</td><td class="p-3 text-right"><span class="px-2 py-1 rounded-full text-xs ${statusTone(pct(periodRevenue(p, period), periodTarget(p, period)))}">${pct(periodRevenue(p, period), periodTarget(p, period))}%</span></td><td class="p-3 text-right">${p.gpPercent}%</td></tr>`).join("")}
          </tbody>
        </table>
      </div>
    `;
  }
  
  function renderActionsView(projects) {
    const openActions = projects.filter(p => p.actionStatus !== "Closed");
    return `
      <div class="rounded-3xl border bg-white p-6">
        <h3 class="font-semibold text-lg mb-4">⚠️ Open Actions (${openActions.length})</h3>
        <div class="space-y-3">
          ${openActions.map(p => `<div class="p-4 bg-slate-50 rounded-2xl border-l-4 ${p.actionStatus === 'Escalated' ? 'border-red-500' : 'border-amber-500'}"><div class="font-medium">${p.project}</div><div class="text-sm text-slate-600 mt-1">Owner: ${p.actionOwner} | Due: ${p.actionDue}</div><div class="text-sm mt-2">${p.recovery}</div><div class="mt-2"><span class="px-2 py-1 rounded-full text-xs ${actionTone(p.actionStatus)}">${p.actionStatus}</span></div></div>`).join("")}
        </div>
      </div>
    `;
  }
  
  function attachEventListeners() {
    document.getElementById("periodSelect")?.addEventListener("change", e=>{ state.period=e.target.value; render(); });
    document.getElementById("divisionSelect")?.addEventListener("change", e=>{ state.division=e.target.value; render(); });
    document.getElementById("searchInput")?.addEventListener("input", e=>{ state.query=e.target.value; render(); });
    document.querySelectorAll("[data-filter]").forEach(el=>{ el.addEventListener("click", ()=>{ const filter = el.getAttribute("data-filter"); state.activeKpi = state.activeKpi===filter ? "all" : filter; render(); }); });
    document.querySelectorAll(".tab-btn").forEach(btn=>{ btn.addEventListener("click",()=>{ state.viewTab=btn.getAttribute("data-tab"); render(); }); });
    document.getElementById("refreshBtn")?.addEventListener("click", async()=>{ sheetData.isLoading=true; render(); await loadDataFromSheets(); render(); });
  }
  
  // Initialize
  async function init() {
    await loadDataFromSheets();
    render();
  }
  
  init();
</script>
</body>
</html>
