<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revenue Dashboard | Live from Google Sheets</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0f172a; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .error-box { background: #fee; border: 1px solid #fcc; padding: 20px; border-radius: 12px; margin: 20px; }
  </style>
</head>
<body class="antialiased bg-slate-100">
<div id="app-root" class="min-h-screen"></div>

<script>
// ============================================
// CONFIGURATION - UPDATE THIS WITH YOUR URL
// ============================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzeLn6TgtYh_RCUgJ3vj5IjQMetEEwOlDudHEOFeIY3wh9iokPMoif2hLek7DVcQKLQGQ/exec'; // <- PASTE YOUR APPS SCRIPT URL HERE

// State management
let sheetData = {
  revenueRows: [],
  confirmedTotal: 0,
  forecastTotal: 0,
  groupMTD: 0,
  groupBYTE: 0,
  isLoading: true,
  error: null
};

let state = {
  period: "Daily",
  division: "All",
  query: "",
  activeKpi: "all",
  viewTab: "executive"
};

// Helper functions
function money(val) { 
  return new Intl.NumberFormat("en-ZA", { style:"currency", currency:"ZAR", maximumFractionDigits:0 }).format(val || 0); 
}

function pct(actual, target) { 
  if (!target || target === 0) return 0; 
  return Math.round((actual / target) * 100); 
}

function statusTone(score) { 
  if (score >= 80) return "bg-green-100 text-green-700 border-green-200"; 
  if (score >= 50) return "bg-amber-100 text-amber-700 border-amber-200"; 
  return "bg-red-100 text-red-700 border-red-200"; 
}

function actionTone(status) { 
  if (status === "Closed") return "bg-green-100 text-green-700"; 
  if (status === "In Progress") return "bg-amber-100 text-amber-700"; 
  if (status === "Escalated") return "bg-red-100 text-red-700"; 
  return "bg-slate-100 text-slate-700"; 
}

function getWeekNumber(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
  const week1 = new Date(d.getFullYear(), 0, 4);
  return 1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

function calculateMTD(rows) {
  const now = new Date();
  const currentMonth = now.getMonth();
  const currentYear = now.getFullYear();
  
  return rows
    .filter(row => {
      const date = new Date(row.date);
      return date.getMonth() === currentMonth && date.getFullYear() === currentYear;
    })
    .reduce((sum, row) => sum + (row.actuals || 0), 0);
}

function calculateBYTE(rows) {
  const now = new Date();
  const currentYear = now.getFullYear();
  
  return rows
    .filter(row => {
      const date = new Date(row.date);
      return date.getFullYear() === currentYear;
    })
    .reduce((sum, row) => sum + (row.actuals || 0), 0);
}

function aggregateProjectsFromRevenue(rows) {
  const projectMap = new Map();
  
  rows.forEach(row => {
    const key = `${row.projectName}|${row.manager}|${row.costCenter}`;
    if (!projectMap.has(key)) {
      projectMap.set(key, {
        id: `P${projectMap.size + 1}`,
        division: row.costCenter || 'General',
        pm: row.manager || 'Unassigned',
        client: row.projectName?.split(' - ')[0] || row.projectName || 'Client',
        project: row.projectName || 'Unknown Project',
        status: "Confirmed",
        revenueDaily: 0,
        revenueWeekly: 0,
        revenueMonthly: 0,
        revenueQuarterly: 0,
        revenueYearly: 0,
        targetDaily: 0,
        targetWeekly: 0,
        targetMonthly: 0,
        targetQuarterly: 0,
        targetYearly: 0,
        gpPercent: row.margin || 15,
        deadlineScore: 75,
        safetyScore: row.safety || 95,
        qualityScore: 80,
        cashCollected: 0,
        forecastYear: 0,
        lastUpdate: new Date().toISOString(),
        recovery: "On track",
        actionOwner: row.manager || 'PM',
        actionDue: new Date(Date.now() + 7*24*60*60*1000).toISOString().split('T')[0],
        actionStatus: "Open"
      });
    }
    
    const project = projectMap.get(key);
    const dailyActual = row.actuals || 0;
    const dailyBudget = row.budgetDaily || 0;
    
    project.revenueDaily += dailyActual;
    project.targetDaily += dailyBudget;
    
    // Store for period aggregations
    const date = new Date(row.date);
    const weekNum = getWeekNumber(date);
    const month = date.getMonth();
    const quarter = Math.floor(date.getMonth() / 3);
    const year = date.getFullYear();
    
    if (!project._weeklyMap) project._weeklyMap = new Map();
    if (!project._monthlyMap) project._monthlyMap = new Map();
    if (!project._quarterlyMap) project._quarterlyMap = new Map();
    
    const weekKey = `${year}-W${weekNum}`;
    const monthKey = `${year}-${month}`;
    const quarterKey = `${year}-Q${quarter}`;
    
    project._weeklyMap.set(weekKey, (project._weeklyMap.get(weekKey) || 0) + dailyActual);
    project._monthlyMap.set(monthKey, (project._monthlyMap.get(monthKey) || 0) + dailyActual);
    project._quarterlyMap.set(quarterKey, (project._quarterlyMap.get(quarterKey) || 0) + dailyActual);
  });
  
  const projects = Array.from(projectMap.values());
  projects.forEach(project => {
    project.revenueWeekly = Math.round(Array.from(project._weeklyMap.values()).reduce((a,b) => a+b, 0) / Math.max(project._weeklyMap.size, 1));
    project.revenueMonthly = Math.round(Array.from(project._monthlyMap.values()).reduce((a,b) => a+b, 0) / Math.max(project._monthlyMap.size, 1));
    project.revenueQuarterly = Math.round(Array.from(project._quarterlyMap.values()).reduce((a,b) => a+b, 0) / Math.max(project._quarterlyMap.size, 1));
    project.revenueYearly = project.revenueDaily * 365;
    
    project.targetWeekly = project.targetDaily * 5;
    project.targetMonthly = project.targetDaily * 22;
    project.targetQuarterly = project.targetMonthly * 3;
    project.targetYearly = project.targetMonthly * 12;
    
    project.cashCollected = project.revenueDaily * 0.7;
    project.forecastYear = project.revenueYearly;
    
    delete project._weeklyMap;
    delete project._monthlyMap;
    delete project._quarterlyMap;
  });
  
  return projects;
}

// Load data from Apps Script
async function loadDataFromSheets() {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_WEB_APP_URL_HERE') {
    sheetData.error = 'Please configure APPS_SCRIPT_URL with your Google Apps Script web app URL';
    sheetData.isLoading = false;
    return;
  }
  
  sheetData.isLoading = true;
  sheetData.error = null;
  
  try {
    console.log('Fetching revenue data from:', APPS_SCRIPT_URL);
    const revenueResponse = await fetch(`${APPS_SCRIPT_URL}?action=getRevenueData`);
    
    if (!revenueResponse.ok) {
      throw new Error(`HTTP ${revenueResponse.status}: ${revenueResponse.statusText}`);
    }
    
    const revenueResult = await revenueResponse.json();
    console.log('Revenue API response:', revenueResult);
    
    if (revenueResult.error) {
      throw new Error(revenueResult.error);
    }
    
    if (!revenueResult.success && !revenueResult.rows) {
      throw new Error('Invalid response format from server');
    }
    
    const revenueRows = revenueResult.rows || [];
    console.log(`Loaded ${revenueRows.length} revenue rows`);
    
    // Fetch budgets data
    const budgetsResponse = await fetch(`${APPS_SCRIPT_URL}?action=getBudgetsData`);
    const budgetsResult = await budgetsResponse.json();
    console.log('Budgets API response:', budgetsResult);
    
    sheetData.revenueRows = revenueRows;
    sheetData.confirmedTotal = budgetsResult.confirmedTotal || 0;
    sheetData.forecastTotal = budgetsResult.forecastTotal || 0;
    sheetData.groupMTD = calculateMTD(revenueRows);
    sheetData.groupBYTE = calculateBYTE(revenueRows);
    sheetData.isLoading = false;
    
    console.log('Data loaded successfully!', {
      revenueRows: revenueRows.length,
      confirmedTotal: sheetData.confirmedTotal,
      forecastTotal: sheetData.forecastTotal,
      groupMTD: sheetData.groupMTD,
      groupBYTE: sheetData.groupBYTE
    });
    
  } catch (error) {
    console.error('Error loading data:', error);
    sheetData.error = error.message;
    sheetData.isLoading = false;
  }
}

// Period helpers
function periodRevenue(p, period) {
  if(period === "Daily") return p.revenueDaily;
  if(period === "Weekly") return p.revenueWeekly;
  if(period === "Monthly") return p.revenueMonthly;
  if(period === "Quarterly") return p.revenueQuarterly;
  return p.revenueYearly;
}

function periodTarget(p, period) {
  if(period === "Daily") return p.targetDaily;
  if(period === "Weekly") return p.targetWeekly;
  if(period === "Monthly") return p.targetMonthly;
  if(period === "Quarterly") return p.targetQuarterly;
  return p.targetYearly;
}

function getFilteredProjects() {
  if (!sheetData.revenueRows.length) return [];
  const projects = aggregateProjectsFromRevenue(sheetData.revenueRows);
  
  return projects.filter(p => {
    if(state.division !== "All" && p.division !== state.division) return false;
    const q = state.query.toLowerCase();
    const matchesQuery = `${p.project} ${p.client} ${p.pm} ${p.division}`.toLowerCase().includes(q);
    if(!matchesQuery) return false;
    
    const rev = periodRevenue(p, state.period);
    const targ = periodTarget(p, state.period);
    
    if(state.activeKpi === "all") return true;
    if(state.activeKpi === "revenue") return rev < targ;
    if(state.activeKpi === "profitability") return p.gpPercent < 15;
    if(state.activeKpi === "deadlines") return p.deadlineScore < 80;
    if(state.activeKpi === "safety") return p.safetyScore < 100;
    if(state.activeKpi === "quality") return p.qualityScore < 80;
    if(state.activeKpi === "cash") return p.cashCollected < rev;
    if(state.activeKpi === "actions") return p.actionStatus !== "Closed";
    return true;
  });
}

function calculateTotals(projects, period) {
  let revenue = 0, target = 0, cash = 0, margin = 0, deadline = 0, safety = 0, quality = 0;
  projects.forEach(p => {
    revenue += periodRevenue(p, period);
    target += periodTarget(p, period);
    cash += p.cashCollected;
    margin += periodRevenue(p, period) * (p.gpPercent / 100);
    deadline += p.deadlineScore;
    safety += p.safetyScore;
    quality += p.qualityScore;
  });
  return { revenue, target, cash, margin, deadline, safety, quality };
}

// Render functions (simplified for brevity - full version available)
let rootEl = document.getElementById("app-root");

function render() {
  if (sheetData.isLoading) {
    rootEl.innerHTML = `<div class="flex items-center justify-center min-h-screen"><div class="text-center"><div class="loading-spinner"></div><p class="mt-4 text-slate-600">Loading data from Google Sheets...</p><p class="text-sm text-slate-400 mt-2">This may take a few seconds</p></div></div>`;
    lucide.createIcons();
    return;
  }
  
  if (sheetData.error) {
    rootEl.innerHTML = `
      <div class="max-w-4xl mx-auto p-8">
        <div class="error-box">
          <h2 class="text-red-700 font-bold text-lg mb-2">⚠️ Error Loading Data</h2>
          <p class="text-red-600 mb-4">${sheetData.error}</p>
          <div class="bg-slate-50 p-4 rounded-lg">
            <p class="font-mono text-sm">Troubleshooting tips:</p>
            <ul class="list-disc ml-5 mt-2 text-sm">
              <li>Make sure you've deployed the Apps Script as a Web App</li>
              <li>Update APPS_SCRIPT_URL with your actual web app URL</li>
              <li>Check that the sheet IDs are correct</li>
              <li>Verify column headers match exactly: Date, Manager, CostCenter, ProjectName, Actuals, Projected Budget</li>
              <li>Re-authorize the Apps Script if needed</li>
            </ul>
          </div>
          <button onclick="location.reload()" class="mt-4 bg-slate-900 text-white px-4 py-2 rounded-lg">Retry</button>
        </div>
      </div>
    `;
    lucide.createIcons();
    return;
  }
  
  const filtered = getFilteredProjects();
  const totals = calculateTotals(filtered, state.period);
  const revenueAchievement = pct(totals.revenue, totals.target);
  const profitability = totals.revenue ? Math.round((totals.margin / totals.revenue) * 100) : 0;
  const deadlineScore = Math.round(totals.deadline / Math.max(filtered.length,1));
  const safetyScore = Math.round(totals.safety / Math.max(filtered.length,1));
  const qualityScore = Math.round(totals.quality / Math.max(filtered.length,1));
  const cashConversion = pct(totals.cash, Math.max(totals.revenue,1));
  
  const divisionMap = new Map();
  filtered.forEach(p => {
    divisionMap.set(p.division, (divisionMap.get(p.division) || 0) + periodRevenue(p, state.period));
  });
  
  rootEl.innerHTML = `
    <div class="max-w-7xl mx-auto p-4 md:p-8">
      <!-- Header -->
      <div class="mb-4 flex items-center justify-between rounded-full border bg-white/80 px-4 py-2 shadow-sm">
        <div class="flex items-center gap-2 text-xs font-semibold uppercase tracking-wide text-slate-500">
          <i data-lucide="layers3" class="w-4 h-4"></i> Revenue Dashboard | Live from Google Sheets
        </div>
        <div class="flex gap-2">
          <span class="text-xs text-green-600 bg-green-50 px-3 py-1 rounded-full">✓ Connected</span>
          <button onclick="refreshData()" class="rounded-full bg-slate-900 text-white px-4 py-1 text-sm flex items-center gap-1 hover:bg-slate-700">
            <i data-lucide="refresh-cw" class="w-4 h-4"></i> Refresh
          </button>
        </div>
      </div>
      
      <!-- Summary Cards -->
      <div class="grid gap-4 md:grid-cols-4 mb-6">
        <div class="rounded-3xl border bg-gradient-to-br from-slate-900 to-slate-800 text-white p-5">
          <div class="text-sm opacity-80">Group MTD</div>
          <div class="text-2xl font-bold mt-2">${money(sheetData.groupMTD)}</div>
          <div class="text-xs opacity-70">Month-to-Date Revenue</div>
        </div>
        <div class="rounded-3xl border bg-gradient-to-br from-slate-700 to-slate-600 text-white p-5">
          <div class="text-sm opacity-80">Group BYTE</div>
          <div class="text-2xl font-bold mt-2">${money(sheetData.groupBYTE)}</div>
          <div class="text-xs opacity-70">Year-to-Date Revenue</div>
        </div>
        <div class="rounded-3xl border bg-gradient-to-br from-emerald-800 to-emerald-700 text-white p-5">
          <div class="text-sm opacity-80">Total Confirmed</div>
          <div class="text-2xl font-bold mt-2">${money(sheetData.confirmedTotal)}</div>
          <div class="text-xs opacity-70">From Budgets Sheet</div>
        </div>
        <div class="rounded-3xl border bg-gradient-to-br from-amber-800 to-amber-700 text-white p-5">
          <div class="text-sm opacity-80">Total Forecast</div>
          <div class="text-2xl font-bold mt-2">${money(sheetData.forecastTotal)}</div>
          <div class="text-xs opacity-70">From Budgets Sheet</div>
        </div>
      </div>
      
      <!-- Filters -->
      <div class="rounded-[32px] border bg-white/90 p-6 shadow-sm mb-6">
        <div class="flex flex-col xl:flex-row xl:items-center xl:justify-between gap-5">
          <div>
            <h1 class="text-2xl font-semibold">Revenue & Performance Dashboard</h1>
            <p class="text-sm text-slate-500 mt-1">${sheetData.revenueRows.length} revenue entries loaded</p>
          </div>
          <div class="grid gap-3 sm:grid-cols-2 xl:grid-cols-4">
            <select id="periodSelect" class="rounded-2xl bg-slate-50 border p-2 text-sm">
              ${["Daily","Weekly","Monthly","Quarterly","Yearly"].map(p=>`<option ${state.period===p?"selected":""}>${p}</option>`).join("")}
            </select>
            <select id="divisionSelect" class="rounded-2xl bg-slate-50 border p-2 text-sm">
              <option value="All">All divisions</option>
              ${[...new Map(filtered.map(p=>[p.division, p.division])).keys()].map(d=>`<option ${state.division===d?"selected":""}>${d}</option>`).join("")}
            </select>
            <div class="xl:col-span-2 relative">
              <input type="text" id="searchInput" placeholder="Search project, PM, client..." value="${state.query.replace(/"/g, '&quot;')}" class="w-full rounded-2xl bg-slate-50 pl-9 p-2 border">
            </div>
          </div>
        </div>
      </div>
      
      <!-- KPI Cards -->
      <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-5 mb-4">
        ${[
          {title:"Revenue", value:money(totals.revenue), sub:`${state.period} revenue`, icon:"circle-dollar-sign", tone:revenueAchievement>=80?"green":revenueAchievement>=50?"amber":"red"},
          {title:"Profitability", value:`${profitability}%`, sub:`${state.period} margin`, icon:"trending-up", tone:profitability>=18?"green":profitability>=12?"amber":"red"},
          {title:"Deadlines", value:`${deadlineScore}%`, sub:`on-time performance`, icon:"clock", tone:deadlineScore>=80?"green":deadlineScore>=50?"amber":"red"},
          {title:"Safety", value:`${safetyScore}%`, sub:`safety score`, icon:"shield-alert", tone:safetyScore===100?"green":"amber"},
          {title:"Quality", value:`${qualityScore}%`, sub:`quality score`, icon:"gauge", tone:qualityScore>=80?"green":qualityScore>=50?"amber":"red"}
        ].map(k=>`<div class="rounded-3xl border p-5 bg-white shadow-sm"><div class="flex justify-between"><div><div class="text-sm text-slate-500">${k.title}</div><div class="text-2xl font-semibold">${k.value}</div><div class="text-xs">${k.sub}</div></div><div class="rounded-2xl p-3 bg-${k.tone}-50"><i data-lucide="${k.icon}" class="w-5 h-5 text-${k.tone}-700"></i></div></div></div>`).join("")}
      </div>
      
      <!-- Project List -->
      <div class="rounded-3xl border bg-white p-6">
        <h3 class="font-semibold text-lg mb-4">📋 Projects (${filtered.length})</h3>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-slate-100">
              <tr><th class="p-3 text-left">Project</th><th class="p-3 text-left">PM</th><th class="p-3 text-left">Division</th><th class="p-3 text-right">Revenue</th><th class="p-3 text-right">Target</th><th class="p-3 text-right">Achievement</th></tr>
            </thead>
            <tbody>
              ${filtered.slice(0,20).map(p => `<tr class="border-b"><td class="p-3">${p.project}</td><td class="p-3">${p.pm}</td><td class="p-3">${p.division}</td><td class="p-3 text-right">${money(periodRevenue(p, state.period))}</td><td class="p-3 text-right">${money(periodTarget(p, state.period))}</td><td class="p-3 text-right"><span class="px-2 py-1 rounded-full text-xs ${statusTone(pct(periodRevenue(p, state.period), periodTarget(p, state.period)))}">${pct(periodRevenue(p, state.period), periodTarget(p, state.period))}%</span></td></tr>`).join("")}
            </tbody>
          </table>
          ${filtered.length > 20 ? `<p class="text-center text-slate-500 text-sm mt-4">Showing 20 of ${filtered.length} projects</p>` : ""}
        </div>
      </div>
    </div>
  `;
  
  lucide.createIcons();
  attachEventListeners();
}

function attachEventListeners() {
  document.getElementById("periodSelect")?.addEventListener("change", e=>{ state.period=e.target.value; render(); });
  document.getElementById("divisionSelect")?.addEventListener("change", e=>{ state.division=e.target.value; render(); });
  document.getElementById("searchInput")?.addEventListener("input", e=>{ state.query=e.target.value; render(); });
}

window.refreshData = async function() {
  await loadDataFromSheets();
  render();
};

// Initialize
async function init() {
  await loadDataFromSheets();
  render();
}

init();
</script>
</body>
</html>
